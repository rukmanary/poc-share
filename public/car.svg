<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <!-- Shadow -->
  <ellipse cx="400" cy="355" rx="320" ry="18" fill="rgba(0,0,0,0.35)" />

  <!-- Car body lower -->
  <rect x="80" y="210" width="640" height="120" rx="18" fill="#1a2a5e" />

  <!-- Car body upper (cabin) -->
  <path d="M200 210 C220 130 280 100 340 90 L460 90 C520 100 580 130 600 210 Z"
        fill="#1e3275" />

  <!-- Windshield front -->
  <path d="M490 95 C530 115 565 155 575 205 L490 205 Z"
        fill="rgba(100,180,255,0.35)" stroke="rgba(100,200,255,0.5)" stroke-width="2" />

  <!-- Windshield rear -->
  <path d="M310 95 C270 115 235 155 225 205 L310 205 Z"
        fill="rgba(100,180,255,0.35)" stroke="rgba(100,200,255,0.5)" stroke-width="2" />

  <!-- Side windows -->
  <path d="M318 98 L354 98 L354 200 L235 200 Z"
        fill="rgba(100,180,255,0.25)" stroke="rgba(100,200,255,0.4)" stroke-width="1.5" />
  <path d="M362 98 L440 98 L440 200 L362 200 Z"
        fill="rgba(100,180,255,0.3)" stroke="rgba(100,200,255,0.4)" stroke-width="1.5" />
  <path d="M448 98 L482 98 L565 200 L448 200 Z"
        fill="rgba(100,180,255,0.25)" stroke="rgba(100,200,255,0.4)" stroke-width="1.5" />

  <!-- Front bumper detail -->
  <rect x="88" y="295" width="120" height="28" rx="6" fill="#0d1a3a" />
  <rect x="88" y="285" width="120" height="15" rx="4" fill="#1a2a5e" />
  <!-- Front grille -->
  <rect x="96" y="298" width="100" height="16" rx="3" fill="#0a1228" />
  <line x1="96" y1="306" x2="196" y2="306" stroke="#2a3a7e" stroke-width="1.5" />
  <line x1="130" y1="298" x2="130" y2="314" stroke="#2a3a7e" stroke-width="1.5" />
  <line x1="148" y1="298" x2="148" y2="314" stroke="#2a3a7e" stroke-width="1.5" />
  <line x1="164" y1="298" x2="164" y2="314" stroke="#2a3a7e" stroke-width="1.5" />

  <!-- Rear bumper -->
  <rect x="592" y="295" width="120" height="28" rx="6" fill="#0d1a3a" />

  <!-- Headlights front -->
  <path d="M82 240 L140 235 L140 265 L82 268 Z"
        fill="rgba(255,240,180,0.9)" />
  <path d="M82 240 L140 235 L140 265 L82 268 Z"
        fill="none" stroke="rgba(255,220,100,0.7)" stroke-width="1.5" />

  <!-- DRL front -->
  <rect x="84" y="235" width="50" height="4" rx="2" fill="rgba(255,255,200,0.95)" />

  <!-- Taillights -->
  <path d="M660 240 L718 243 L718 268 L660 265 Z"
        fill="rgba(220,40,40,0.85)" />
  <rect x="668" y="235" width="46" height="4" rx="2" fill="rgba(255,80,80,0.9)" />

  <!-- Front wheel arch -->
  <path d="M105 330 Q105 260 185 260 Q265 260 265 330"
        fill="#0d1428" stroke="#1a2a5e" stroke-width="2" />
  <!-- Rear wheel arch -->
  <path d="M535 330 Q535 260 615 260 Q695 260 695 330"
        fill="#0d1428" stroke="#1a2a5e" stroke-width="2" />

  <!-- Front wheel -->
  <circle cx="185" cy="330" r="52" fill="#111827" />
  <circle cx="185" cy="330" r="42" fill="#1c2540" />
  <circle cx="185" cy="330" r="30" fill="#0f1520" />
  <!-- Spokes front -->
  <line x1="185" y1="295" x2="185" y2="365" stroke="#c0c8d8" stroke-width="3.5" />
  <line x1="152" y1="310" x2="218" y2="350" stroke="#c0c8d8" stroke-width="3.5" />
  <line x1="152" y1="350" x2="218" y2="310" stroke="#c0c8d8" stroke-width="3.5" />
  <line x1="148" y1="330" x2="222" y2="330" stroke="#c0c8d8" stroke-width="3.5" />
  <circle cx="185" cy="330" r="10" fill="#c0c8d8" />

  <!-- Rear wheel -->
  <circle cx="615" cy="330" r="52" fill="#111827" />
  <circle cx="615" cy="330" r="42" fill="#1c2540" />
  <circle cx="615" cy="330" r="30" fill="#0f1520" />
  <!-- Spokes rear -->
  <line x1="615" y1="295" x2="615" y2="365" stroke="#c0c8d8" stroke-width="3.5" />
  <line x1="582" y1="310" x2="648" y2="350" stroke="#c0c8d8" stroke-width="3.5" />
  <line x1="582" y1="350" x2="648" y2="310" stroke="#c0c8d8" stroke-width="3.5" />
  <line x1="578" y1="330" x2="652" y2="330" stroke="#c0c8d8" stroke-width="3.5" />
  <circle cx="615" cy="330" r="10" fill="#c0c8d8" />

  <!-- BYD logo badge -->
  <rect x="355" y="268" width="90" height="26" rx="5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />
  <text x="400" y="286" text-anchor="middle" fill="#ffd700"
    font-family="Arial, sans-serif" font-weight="800" font-size="14" letter-spacing="2">BYD M6</text>

  <!-- Side stripe accent -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="rgba(100,160,255,0.2)" stroke-width="1" />
</svg>
